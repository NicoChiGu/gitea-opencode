services:
  runner:
    image: docker.io/gitea/act_runner:latest
    environment:
      CONFIG_FILE: /config.yaml
      GITEA_INSTANCE_URL: "${GITEA_INSTANCE_URL}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "${GITEA_RUNNER_REGISTRATION_TOKEN}"
      GITEA_RUNNER_NAME: "${GITEA_RUNNER_NAME:-gitea-opencode-runner}"
      GITEA_RUNNER_LABELS: "${GITEA_RUNNER_LABELS:-opencode:docker://registry.cn-hangzhou.aliyuncs.com/terata/gitea-opencode:latest}"
    volumes:
      - ./runner-config.example.yaml:/config.yaml:ro
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
