name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronized]
  workflow_dispatch:
    inputs:
      prompt:
        description: "OpenCode prompt"
        required: true
      create_pr:
        description: "Create a PR when OpenCode changes files"
        required: false
        default: "true"

permissions:
  contents: write
  code: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    runs-on: __RUNNER_LABEL__
    container:
      image: __CONTAINER_IMAGE__
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode for Gitea
        env:
__PROVIDER_API_KEY_ENV__
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          OPENCODE_GITEA_TOKEN: ${{ secrets.OPENCODE_GITEA_TOKEN }}
          OPENCODE_MODEL: "__OPENCODE_MODEL__"
        run: |
          set -eu
          echo "[gitea-opencode] preflight started at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "[gitea-opencode] job container: __CONTAINER_IMAGE__"
          echo "[gitea-opencode] runner label: __RUNNER_LABEL__"
          echo "[gitea-opencode] model: $OPENCODE_MODEL"
          echo "[gitea-opencode] repository: ${GITHUB_REPOSITORY:-}"
          echo "[gitea-opencode] event name: ${GITHUB_EVENT_NAME:-}"
          echo "[gitea-opencode] event path: ${GITHUB_EVENT_PATH:-}"
          echo "[gitea-opencode] workspace: ${GITHUB_WORKSPACE:-$(pwd)}"
          echo "[gitea-opencode] PATH: $PATH"
          echo "[gitea-opencode] command: $(command -v gitea-opencode)"
          echo "[gitea-opencode] version: $(gitea-opencode --version)"
          gitea-opencode
