log:
  level: info

runner:
  file: /data/.runner
  capacity: 1
  timeout: 3h
  insecure: false
  fetch_timeout: 5s
  fetch_interval: 2s

cache:
  enabled: false

container:
  network: ""
  privileged: false
  options: ""
  valid_volumes: []
  docker_host: ""

host:
  workdir_parent: ""

runners:
  labels:
    - "opencode:docker://registry.cn-hangzhou.aliyuncs.com/terata/gitea-opencode:latest"
